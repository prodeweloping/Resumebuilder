<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Resume Builder · Pro Toolss</title>
    <!-- FAVICON – updated with your image URL -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/FkJPMZ8r/Chat-GPT-Image-Jun-18-2026-07-58-22-AM.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* ===== GLOBAL RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 75px;
            /* space for fixed navbar */
            overflow-x: hidden;
        }

        /* ===== NEW NAVBAR (from second file) ===== */
        .new-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
        }
        .logo-blue {
            color: #007BFF;
        }
        .logo-orange {
            color: #FF6F00;
        }

        .home-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .home-btn .lines {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .home-btn .lines span {
            width: 24px;
            height: 3px;
            background: #1e293b;
            border-radius: 10px;
        }
        .home-btn .label {
            font-size: 10px;
            font-weight: 700;
            color: #1e293b;
            margin-top: 3px;
            text-transform: uppercase;
        }

        /* ===== MAIN CONTENT ===== */
        .main-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 20px;
            padding-bottom: 90px;
            /* space for fixed footer on mobile */
            flex: 1 0 auto;
        }

        /* ===== RESUME CARDS ===== */
        .resume-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .resume-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -10px rgba(0, 0, 0, 0.15);
        }

        .demo-img-wrapper {
            width: 100%;
            aspect-ratio: 1080 / 1508;
            border-radius: 1rem;
            overflow: hidden;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resume-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }
        .resume-card:hover .resume-image {
            transform: scale(1.03);
        }

        .template-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0.75rem;
            margin-bottom: 0.2rem;
            letter-spacing: -0.3px;
        }
        .template-sub {
            font-size: 0.85rem;
            color: #475569;
        }

        /* ===== NEW FOOTER (from second file) ===== */
        footer {
            background: #0b1426;
            color: white;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            padding: 0 12px;
        }
        .design-footer {
            color: #94a3b8;
            font-size: 1rem;
        }
        .highlight {
            color: #facc15;
            font-weight: 700;
            text-decoration: underline;
        }
        .highlight:hover {
            color: #fde047;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            footer {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 35;
            }
            .main-container {
                padding-bottom: 90px;
            }
        }

        /* extra spacing for grid note */
        .mt-10 {
            margin-top: 2.5rem;
        }
        .border-t {
            border-top: 1px solid #e5e7eb;
        }
        .pt-6 {
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!--  NEW NAVBAR  (Pro Toolss branding, home button)              -->
    <!-- ============================================================ -->
    <nav class="new-nav">
        <div class="logo">
            <span class="logo-blue">Pro</span>
            <span class="logo-orange">Toolss</span>
        </div>

        <button id="homeBtn" class="home-btn" aria-label="Home">
            <div class="lines">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="label">Home</span>
        </button>
    </nav>

    <!-- ============================================================ -->
    <!--  MAIN CONTENT – Resume Builder (grid with images)            -->
    <!-- ============================================================ -->
    <main class="main-container">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 to-orange-600 inline-block text-transparent bg-clip-text">
                Resume Builder
            </h1>
            <p class="text-gray-600 text-lg mt-2">Professionally designed templates</p>
        </div>

        <!-- 2×2 grid of resume cards (local images) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 lg:gap-8">

            <!-- card 1 → 1template.html -->
            <div class="resume-card" onclick="window.location.href='1template.html'">
                <div class="demo-img-wrapper">
                    <img src="1r.jpg" alt="Resume Template 1" class="resume-image" loading="lazy">
                </div>
                <div class="template-name">Resume Template</div>
                <p class="template-sub">Corporate Blue · ATS friendly</p>
            </div>

            <!-- card 2 → 2.html -->
            <div class="resume-card" onclick="window.location.href='#home'">
                <div class="demo-img-wrapper">
                    <img src="r2.jpg" alt="Resume Template 2" class="resume-image" loading="lazy">
                </div>
                <div class="template-name">Resume Template</div>
                <p class="template-sub">Minimal Dark · senior</p>
            </div>

        </div><!-- /grid -->

        <!-- optional spacer -->
        <div class="mt-10 text-center text-sm text-gray-400 border-t pt-6">
            <!-- reserved for future use -->
        </div>
    </main>

    <!-- ============================================================ -->
    <!--  NEW FOOTER  (Pro Toolss branding, link to protoolss.online) -->
    <!-- ============================================================ -->
    <footer>
        <div class="design-footer">
            Design by
            <a href="https://www.protoolss.online" target="_blank" class="highlight">
                Pro Toolss
            </a>
        </div>
    </footer>

    <!-- ============================================================ -->
    <!--  SCRIPT – Home button redirect                                -->
    <!-- ============================================================ -->
    <script>
        document.getElementById('homeBtn').addEventListener('click', function() {
            window.location.href = 'https://www.protoolss.online';
        });

        console.log('✅ Resume Builder with new navbar & footer (Pro Toolss)');
        console.log('📸 Local images: 1r.jpg, r2.jpg');
        console.log('🖼️ Favicon set from your URL');
    </script>

</body>
</html>
